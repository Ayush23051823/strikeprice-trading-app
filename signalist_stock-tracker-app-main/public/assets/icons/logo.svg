<svg width="180" height="40" viewBox="0 0 180 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Candlestick icon -->
  <g transform="translate(6, 20)">
    <!-- Candle 1 -->
    <line x1="0" y1="-14" x2="0" y2="-10" stroke="#10b981" stroke-width="1.5" stroke-linecap="round"/>
    <rect x="-5" y="-10" width="10" height="12" rx="1.5" fill="#10b981"/>
    <line x1="0" y1="2" x2="0" y2="6" stroke="#10b981" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Candle 2 -->
    <line x1="18" y1="-18" x2="18" y2="-14" stroke="#10b981" stroke-width="1.5" stroke-linecap="round"/>
    <rect x="13" y="-14" width="10" height="16" rx="1.5" fill="#10b981"/>
    <line x1="18" y1="2" x2="18" y2="6" stroke="#10b981" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Candle 3 -->
    <line x1="36" y1="-22" x2="36" y2="-18" stroke="#10b981" stroke-width="1.5" stroke-linecap="round"/>
    <rect x="31" y="-18" width="10" height="20" rx="1.5" fill="#10b981"/>
    <line x1="36" y1="2" x2="36" y2="6" stroke="#10b981" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Baseline -->
    <line x1="-8" y1="8" x2="44" y2="8" stroke="#1a3a2a" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Trend line -->
    <path d="M -6 4 Q 16 -10 44 -20" fill="none" stroke="#10b981" stroke-width="1.2" stroke-linecap="round" stroke-dasharray="2.5 2.5"/>
  </g>
  <!-- Wordmark -->
  <text x="56" y="27" font-family="Arial, sans-serif" font-weight="800" font-size="20" fill="white">Strike</text>
  <text x="122" y="27" font-family="Arial, sans-serif" font-weight="800" font-size="20" fill="#10b981">Price</text>
</svg>